services:
  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    volumes:
      - db_data:/data/db
      - media_storage:/data/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - db_data:/data/db
      - media_storage:/data/storage

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      backend:
        condition: service_started
    volumes:
      - db_data:/data/db
      - media_storage:/data/storage

  backend-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["pytest"]
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////tmp/teamtracks-test.db
      STORAGE_ROOT: /tmp/teamtracks-storage
      PLATFORM_ADMIN_PASSWORD: test-password
      AUTH_SECRET: test-auth-secret

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.development
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  frontend-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: frontend/Dockerfile.development
    command: ["npm", "test"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  db_data:
  media_storage:
  frontend_node_modules:
